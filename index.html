<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不動産証券化マスター 一問一答</title>
<style>
:root {
  --bg: #F5F5F5;
  --surface: #FFFFFF;
  --surface2: #F0F0F0;
  --border: #E5E5E5;
  --text: #111111;
  --sub: #999999;
  --accent: #111111;
  --radius: 12px;
  --shadow: 0 1px 10px rgba(0,0,0,.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* ── Layout ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }
.header {
  padding: 14px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: .02em; }
.back-btn {
  background: none; border: none; cursor: pointer; color: var(--sub);
  padding: 4px 8px 4px 0; display: flex; align-items: center;
  font-size: 22px; line-height: 1; transition: color .15s;
}
.back-btn:hover { color: var(--text); }
body.locked #section-screen .back-btn { display: none; }
.content { flex: 1; padding: 20px; max-width: 640px; margin: 0 auto; width: 100%; }

/* ── Home ── */
.app-title { text-align: center; padding: 40px 0 32px; }
.app-title h1 { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.5; letter-spacing: .02em; }
.app-title p { color: var(--sub); font-size: 12px; margin-top: 8px; letter-spacing: .06em; text-transform: uppercase; }
.app-title-divider { width: 32px; height: 2px; background: var(--text); margin: 16px auto 0; }

.stats-bar { display: flex; gap: 10px; margin-bottom: 24px; }
.stat-card {
  flex: 1; background: var(--surface); border-radius: var(--radius); padding: 14px;
  text-align: center; border: 1px solid var(--border);
}
.stat-card .num { font-size: 24px; font-weight: 800; color: var(--text); }
.stat-card .lbl { font-size: 11px; color: var(--sub); margin-top: 3px; letter-spacing: .04em; }

.section-title {
  font-size: 10px; font-weight: 700; color: var(--sub);
  letter-spacing: .1em; text-transform: uppercase; margin: 0 0 12px;
}

.mode-buttons { display: flex; gap: 8px; margin-bottom: 28px; }
.mode-btn {
  flex: 1; padding: 12px 6px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  font-size: 12px; font-weight: 600; cursor: pointer;
  text-align: center; transition: all .15s; color: var(--sub);
  display: flex; flex-direction: column; align-items: center; gap: 7px;
}
.mode-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface); }

.subject-grid { display: flex; flex-direction: column; gap: 8px; }
.subject-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
  display: flex; overflow: hidden;
}
.subject-card:hover { border-color: var(--text); box-shadow: var(--shadow); }
.subject-card-accent { width: 3px; background: var(--text); flex-shrink: 0; }
.subject-card-body {
  flex: 1; padding: 15px 15px 15px 14px;
  display: flex; align-items: center; gap: 14px;
}
.subject-card .info { flex: 1; min-width: 0; }
.subject-card .sname { font-size: 13px; font-weight: 700; line-height: 1.45; }
.subject-card .smeta { font-size: 11px; color: var(--sub); margin-top: 3px; }
.subject-card .sacc { font-size: 12px; font-weight: 700; color: var(--sub); white-space: nowrap; }
.progress-ring { width: 40px; height: 40px; flex-shrink: 0; }

/* ── Section list ── */
.section-list { display: flex; flex-direction: column; gap: 8px; }
.section-item {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 14px 16px;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: border-color .15s, box-shadow .15s;
}
.section-item:hover { border-color: var(--text); box-shadow: var(--shadow); }
.section-item .si-info { flex: 1; min-width: 0; }
.section-item .si-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
.section-item .si-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
.section-item .si-acc {
  font-size: 12px; font-weight: 700; color: var(--sub);
  padding: 4px 10px; border-radius: 20px; background: var(--surface2); flex-shrink: 0;
}

.study-modes { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.study-mode-btn {
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; color: var(--sub);
  display: flex; align-items: center; gap: 6px;
}
.study-mode-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.study-mode-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }

/* ── Study screen ── */
.study-header {
  padding: 12px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.progress-info {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.progress-info span { font-size: 13px; color: var(--sub); font-weight: 600; }
#study-score-label { color: #15803D !important; }
.progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width .3s; }

.study-content { padding: 20px; max-width: 640px; margin: 0 auto; width: 100%; }
.question-card {
  background: var(--surface); border-radius: var(--radius); padding: 28px 24px;
  border: 1px solid var(--border); margin-bottom: 16px;
  min-height: 160px; display: flex; flex-direction: column; justify-content: center;
  box-shadow: var(--shadow);
}
.q-number {
  font-size: 10px; font-weight: 700; color: var(--sub);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px;
}
.q-text { font-size: 16px; line-height: 1.8; font-weight: 500; color: var(--text); }

.judge-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.judge-btn {
  padding: 20px; border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 28px; font-weight: 800; cursor: pointer;
  background: var(--surface); transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text);
}
.judge-btn span { font-size: 12px; font-weight: 600; color: var(--sub); }
.judge-btn:hover { border-color: var(--text); background: var(--text); color: white; }
.judge-btn:hover span { color: rgba(255,255,255,.7); }
.judge-btn.answered { pointer-events: none; opacity: 0.25; }
.judge-btn.answered.selected { opacity: 1; }
.judge-btn.correct-answer {
  background: #F3F4F6 !important; border-color: #9CA3AF !important;
  color: #374151 !important; opacity: 1 !important;
}
.judge-btn.correct-answer span { color: #6B7280 !important; }

.skip-btn {
  width: 100%; padding: 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--sub); transition: all .15s; margin-top: 8px;
}
.skip-btn:hover { border-color: var(--text); color: var(--text); }

.answer-section { display: none; }
.answer-section.visible { display: block; }

.result-feedback {
  font-size: 15px; font-weight: 700; padding: 12px 20px;
  border-radius: var(--radius); margin-bottom: 12px; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.result-feedback.hit  { background: #DCFCE7; color: #15803D; }
.result-feedback.miss { background: #FEE2E2; color: #B91C1C; }

.answer-badge {
  display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px;
  border-radius: 30px; font-size: 17px; font-weight: 800; margin-bottom: 14px;
  background: var(--surface); border: 1.5px solid var(--border); color: var(--text);
}

.answer-divider {
  border: none; border-top: 1px solid var(--border); margin: 14px 0;
}

.answer-label {
  font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 6px; margin-top: 2px;
}

.explanation {
  background: var(--surface2); border-radius: var(--radius); padding: 14px 16px;
  font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 14px;
  border-left: 3px solid var(--text);
}

.note-link {
  display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--text); text-decoration: none; margin-bottom: 16px;
  font-weight: 600; opacity: .5; transition: opacity .15s;
}
.note-link:hover { opacity: 1; text-decoration: underline; }

.secondary-actions { display: flex; gap: 10px; }
.bookmark-btn {
  flex: 1; padding: 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; color: var(--sub);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.bookmark-btn:hover { border-color: var(--text); color: var(--text); }
.bookmark-btn.bookmarked { background: var(--text); border-color: var(--text); color: white; }

/* ── Results ── */
.results-content { padding: 40px 20px; text-align: center; }
.score-ring-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
.score-ring { width: 144px; height: 144px; }
.results-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.results-sub { color: var(--sub); font-size: 14px; margin-bottom: 32px; }
.results-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 32px; }
.rs-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px 10px; border: 1px solid var(--border);
}
.rs-card .num { font-size: 26px; font-weight: 800; color: var(--text); }
.rs-card .lbl { font-size: 11px; color: var(--sub); margin-top: 4px; letter-spacing: .04em; }
.rs-card.c .num { color: #15803D; }
.rs-card.w .num { color: #B91C1C; }

.result-actions { display: flex; flex-direction: column; gap: 10px; }
.result-btn {
  padding: 15px; border-radius: var(--radius); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.result-btn:hover { opacity: .8; }
.result-btn.primary { background: var(--text); color: white; border: none; }
.result-btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-icon { margin: 0 auto 16px; display: block; opacity: .25; }
.empty-state p { font-size: 15px; }

/* ── List view ── */
.list-items { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
.list-item-header {
  padding: 14px 16px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px; transition: background .15s;
}
.list-item-header:hover { background: var(--surface2); }
.list-item-q { flex: 1; font-size: 14px; line-height: 1.6; font-weight: 500; }
.list-item-arrow {
  font-size: 14px; color: var(--sub); flex-shrink: 0;
  transition: transform .2s; margin-top: 2px;
}
.list-item.open .list-item-arrow { transform: rotate(90deg); }
.list-item-body { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
.list-item.open .list-item-body { display: block; }
.list-item-body .answer-badge { margin-top: 12px; font-size: 15px; padding: 6px 14px; }
.list-item-body .explanation { margin-top: 10px; margin-bottom: 0; }

/* ── Section reset ── */
.reset-btn {
  background: none; border: none; cursor: pointer; color: var(--sub);
  padding: 6px; border-radius: 6px; transition: all .15s;
  flex-shrink: 0; display: flex; align-items: center;
}
.reset-btn:hover { color: var(--text); background: var(--surface2); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: white;
  padding: 11px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 600; transition: transform .3s;
  z-index: 100; white-space: nowrap; box-shadow: var(--shadow);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ───── HOME ───── -->
<div id="home" class="screen active">
  <div class="content">
    <div class="app-title">
      <h1>不動産証券化マスター<br>一問一答</h1>
      <p>本試験対策 · 問題演習</p>
      <div class="app-title-divider"></div>
    </div>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="startAll()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        全問題
      </button>
      <button class="mode-btn" onclick="showList('wrong')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        間違えた問題
      </button>
      <button class="mode-btn" onclick="showList('bookmark')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        ブックマーク
      </button>
    </div>
    <div class="section-title">科目を選択</div>
    <div id="subject-grid" class="subject-grid"></div>
  </div>
</div>

<!-- ───── SECTION LIST ───── -->
<div id="section-screen" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1 id="section-header-title">—</h1>
  </div>
  <div class="content">
    <div class="stats-bar" id="section-stats-bar" style="margin-bottom:16px">
      <div class="stat-card"><div class="num" id="sec-total">—</div><div class="lbl">総問題数</div></div>
      <div class="stat-card"><div class="num" id="sec-done">—</div><div class="lbl">回答済み</div></div>
    </div>
    <div class="study-modes" id="section-modes"></div>
    <div class="section-title">セクション</div>
    <div id="section-list" class="section-list"></div>
  </div>
</div>

<!-- ───── STUDY ───── -->
<div id="study-screen" class="screen">
  <div class="study-header">
    <div class="progress-info">
      <button class="back-btn" style="padding:0;font-size:13px;font-weight:600;gap:4px;display:flex;align-items:center" onclick="exitStudy()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        戻る
      </button>
      <span id="study-progress-label">1 / 10</span>
      <span id="study-score-label">○ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="study-content">
    <div class="question-card">
      <div class="q-number" id="q-number">Q1</div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="judge-area" id="choice-area">
      <button class="judge-btn" id="btn-maru" onclick="answerQuestion('○')">○<span>正しい</span></button>
      <button class="judge-btn" id="btn-batsu" onclick="answerQuestion('×')">×<span>誤り</span></button>
    </div>
    <button class="skip-btn" id="skip-btn" onclick="skipQuestion()">スキップ →</button>
    <div class="answer-section" id="answer-section">
      <div id="result-feedback" class="result-feedback"></div>
      <hr class="answer-divider">
      <div class="answer-label">正解</div>
      <div id="answer-badge" class="answer-badge"></div>
      <div id="explanation-wrap" style="display:none">
        <div class="answer-label" style="margin-top:10px">解説</div>
        <div id="explanation" class="explanation"></div>
      </div>
      <a id="note-link" class="note-link" href="#" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        noteで詳しく読む
      </a>
      <div class="secondary-actions">
        <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()"></button>
        <button class="skip-btn" style="flex:1;margin-top:0" onclick="nextQuestion()">次の問題 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ───── RESULTS ───── -->
<div id="results-screen" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1>セッション完了</h1>
  </div>
  <div class="results-content">
    <div class="score-ring-wrap" id="score-ring-wrap"></div>
    <div class="results-title" id="result-title">お疲れ様でした！</div>
    <div class="results-sub" id="result-sub"></div>
    <div class="results-stats">
      <div class="rs-card"><div class="num" id="r-total">0</div><div class="lbl">問</div></div>
      <div class="rs-card c"><div class="num" id="r-correct">0</div><div class="lbl">正解</div></div>
      <div class="rs-card w"><div class="num" id="r-wrong">0</div><div class="lbl">不正解</div></div>
    </div>
    <div class="result-actions">
      <button class="result-btn primary" id="retry-wrong-btn" onclick="retryWrong()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
        間違えた問題を解く
      </button>
      <button class="result-btn secondary" onclick="goHome()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        ホームに戻る
      </button>
    </div>
  </div>
</div>

<!-- ───── LIST VIEW ───── -->
<div id="list-screen" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1 id="list-title">間違えた問題</h1>
  </div>
  <div class="content">
    <div id="list-summary" style="font-size:13px;color:var(--sub);margin-bottom:16px"></div>
    <div id="list-items" class="list-items"></div>
    <div id="list-empty" class="empty-state" style="display:none">
      <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      <p id="list-empty-msg">まだありません</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  SVG ICONS
// ══════════════════════════════════════════════
const IC = {
  check: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  x: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  bookmark: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
  bookmarkFill: `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
  list: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  xCircle: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  reset: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
};

// ══════════════════════════════════════════════
//  DATA & STORAGE
// ══════════════════════════════════════════════
let APP_DATA = null;
let PROGRESS = {};
let HASH_SUBJECT = null;

function loadProgress() {
  try { PROGRESS = JSON.parse(localStorage.getItem('smProgress') || '{}'); } catch { PROGRESS = {}; }
}
function saveProgress() { localStorage.setItem('smProgress', JSON.stringify(PROGRESS)); }
function getP(id) {
  if (!PROGRESS[id]) PROGRESS[id] = { correct: 0, incorrect: 0, bookmarked: false };
  return PROGRESS[id];
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function init() {
  loadProgress();
  try {
    const r = await fetch('data.json');
    APP_DATA = await r.json();
  } catch {
    APP_DATA = window.EMBEDDED_DATA || { subjects: [] };
  }
  const HASH_MAP = {'102':'102','103':'103','104u':'104上','104d':'104下','105':'105','106':'106'};
  const hash = location.hash.replace('#','');
  const subjId = HASH_MAP[hash] || hash;
  if (subjId && APP_DATA.subjects.find(s => s.id === subjId)) {
    HASH_SUBJECT = subjId;
    document.body.classList.add('locked');
    showSubject(subjId);
  } else {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;
                  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;
                  background:#F5F5F5;color:#999;text-align:center;padding:40px">
        <div>
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#BBBBBB"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               style="display:block;margin:0 auto 20px">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <h2 style="font-size:16px;font-weight:700;color:#111;margin-bottom:10px">アクセスできません</h2>
          <p style="font-size:13px;line-height:1.7">各科目のURLからアクセスしてください</p>
        </div>
      </div>`;
  }
}

// ══════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════
function allQuestions() {
  return APP_DATA.subjects.flatMap(s => s.sections.flatMap(sec => sec.questions));
}

function renderHome() {
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = '';
  APP_DATA.subjects.forEach(subj => {
    const qs   = subj.sections.flatMap(s => s.questions);
    const done = qs.filter(q => { const p = PROGRESS[q.id]; return p && (p.correct + p.incorrect) > 0; });
    const cor  = qs.filter(q => { const p = PROGRESS[q.id]; return p && p.correct > 0; });
    const acc  = qs.length ? Math.round(cor.length  / qs.length * 100) : 0;
    const pct  = qs.length ? Math.round(done.length / qs.length * 100) : 0;
    const r = 16, circ = 2 * Math.PI * r;
    const offset = circ * (1 - pct / 100);

    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = `
      <div class="subject-card-accent"></div>
      <div class="subject-card-body">
        <svg class="progress-ring" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="${r}" fill="none" stroke="#E5E5E5" stroke-width="3.5"/>
          <circle cx="20" cy="20" r="${r}" fill="none" stroke="#111111" stroke-width="3.5"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
            stroke-linecap="round" transform="rotate(-90 20 20)"/>
          <text x="20" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#111111">${pct}%</text>
        </svg>
        <div class="info">
          <div class="sname">${subj.name}</div>
          <div class="smeta">${subj.sections.length}セクション · ${qs.length}問</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="sacc">正解済 ${acc}%</div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
    card.onclick = () => showSubject(subj.id);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  SUBJECT / SECTION
// ══════════════════════════════════════════════
let currentSubject = null;
let currentMode = 'all';

function showSubject(subjId) {
  currentSubject = APP_DATA.subjects.find(s => s.id === subjId);
  currentMode = 'all';
  document.getElementById('section-header-title').textContent = currentSubject.name;
  const subjQs   = currentSubject.sections.flatMap(s => s.questions);
  const subjDone = subjQs.filter(q => { const p = PROGRESS[q.id]; return p && (p.correct + p.incorrect) > 0; });
  document.getElementById('sec-total').textContent = subjQs.length;
  document.getElementById('sec-done').textContent  = subjDone.length;

  const modes = document.getElementById('section-modes');
  modes.innerHTML = `
    <button class="study-mode-btn active" onclick="setMode('all',this)">${IC.list} 全問題</button>
    <button class="study-mode-btn" onclick="setMode('wrong',this)">${IC.xCircle} 間違えた問題</button>
    <button class="study-mode-btn" onclick="setMode('bookmark',this)">${IC.bookmark} ブックマーク</button>`;

  renderSections();
  showScreen('section-screen');
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.study-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSections();
}

function renderSections() {
  const subjQs   = currentSubject.sections.flatMap(s => s.questions);
  const subjDone = subjQs.filter(q => { const p = PROGRESS[q.id]; return p && (p.correct + p.incorrect) > 0; });
  document.getElementById('sec-total').textContent = subjQs.length;
  document.getElementById('sec-done').textContent  = subjDone.length;

  const list = document.getElementById('section-list');
  list.innerHTML = '';
  currentSubject.sections.forEach(sec => {
    const allQs    = sec.questions;
    const cor      = allQs.filter(q => { const p = PROGRESS[q.id]; return p && p.correct > 0; });
    const acc      = allQs.length ? Math.round(cor.length / allQs.length * 100) : 0;
    const filtCount = filterQuestions(sec.questions).length;

    const item = document.createElement('div');
    item.className = 'section-item';
    if (filtCount === 0) item.style.opacity = '0.35';
    item.innerHTML = `
      <div class="si-info">
        <div class="si-title">${sec.title}</div>
        <div class="si-meta">${filtCount > 0 ? filtCount : allQs.length}問${currentMode !== 'all' ? ` (全${allQs.length}問中)` : ''}</div>
      </div>
      <div class="si-acc">${acc}%</div>
      <button class="reset-btn" title="このセクションをリセット"
        onclick="event.stopPropagation();resetSection('${sec.id}')">${IC.reset}</button>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
    if (filtCount > 0) item.onclick = () => startSection(sec.id);
    list.appendChild(item);
  });
}

function filterQuestions(qs) {
  if (currentMode === 'wrong')    return qs.filter(q => { const p = PROGRESS[q.id]; return p && p.incorrect > 0; });
  if (currentMode === 'bookmark') return qs.filter(q => PROGRESS[q.id]?.bookmarked);
  return qs;
}

// ══════════════════════════════════════════════
//  STUDY SESSION
// ══════════════════════════════════════════════
let session = { questions: [], idx: 0, correct: 0, wrong: 0, noteUrl: '' };

function buildQueue(questions) { return [...questions].sort(() => Math.random() - 0.5); }

function startAll()        { startSession(allQuestions(), null); }
function startWrong()      {
  const qs = allQuestions().filter(q => PROGRESS[q.id]?.incorrect > 0);
  if (!qs.length) { showToast('間違えた問題はまだありません'); return; }
  startSession(qs, null);
}
function startBookmarked() {
  const qs = allQuestions().filter(q => PROGRESS[q.id]?.bookmarked);
  if (!qs.length) { showToast('ブックマークされた問題はまだありません'); return; }
  startSession(qs, null);
}
function startSubject() {
  const qs = filterQuestions(currentSubject.sections.flatMap(s => s.questions));
  if (!qs.length) { showToast('該当する問題がありません'); return; }
  startSession(qs, null);
}
function startSection(secId) {
  const sec = currentSubject.sections.find(s => s.id === secId);
  const qs  = filterQuestions(sec.questions);
  if (!qs.length) { showToast('該当する問題がありません'); return; }
  startSession(qs, sec.note_url);
}

function startSession(questions, noteUrl) {
  if (!questions.length) { showToast('問題がありません'); return; }
  session = {
    questions: buildQueue(questions),
    idx: 0, correct: 0, wrong: 0,
    noteUrl: noteUrl || findNoteUrl(questions[0].id)
  };
  showScreen('study-screen');
  renderQuestion();
}

function findNoteUrl(qId) {
  for (const subj of APP_DATA.subjects)
    for (const sec of subj.sections)
      if (sec.questions.find(q => q.id === qId)) return sec.note_url;
  return '#';
}

function renderQuestion() {
  const q = session.questions[session.idx];
  if (!q) { showResults(); return; }

  const total = session.questions.length;
  const pct   = Math.round(session.idx / total * 100);
  document.getElementById('study-progress-label').textContent = `${session.idx + 1} / ${total}`;
  document.getElementById('study-score-label').textContent    = `○ ${session.correct}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent = `Q${session.idx + 1}`;
  document.getElementById('q-text').textContent   = q.q;

  document.getElementById('btn-maru').className  = 'judge-btn';
  document.getElementById('btn-batsu').className = 'judge-btn';
  document.getElementById('answer-section').classList.remove('visible');
  document.getElementById('skip-btn').style.display = 'block';
  document.getElementById('note-link').href = session.noteUrl || findNoteUrl(q.id);
  updateBookmarkBtn(q.id);
}

function answerQuestion(userAnswer) {
  const q         = session.questions[session.idx];
  const isCorrect = userAnswer === q.a;

  const p = getP(q.id);
  if (isCorrect) { p.correct++;   session.correct++; }
  else           { p.incorrect++; session.wrong++;   }
  saveProgress();

  const bm = document.getElementById('btn-maru'), bb = document.getElementById('btn-batsu');
  bm.classList.add('answered'); bb.classList.add('answered');
  (userAnswer === '○' ? bm : bb).classList.add('selected');
  (q.a === '○' ? bm : bb).classList.add('correct-answer');

  document.getElementById('skip-btn').style.display = 'none';

  const fb = document.getElementById('result-feedback');
  fb.className = 'result-feedback ' + (isCorrect ? 'hit' : 'miss');
  fb.innerHTML = isCorrect ? `${IC.check} 正解！` : `${IC.x} 不正解`;

  const badge = document.getElementById('answer-badge');
  badge.className = 'answer-badge';
  badge.textContent = q.a === '○' ? '○ 正しい' : '× 誤り';

  const expWrap = document.getElementById('explanation-wrap');
  const expEl   = document.getElementById('explanation');
  if (q.exp) { expEl.textContent = q.exp; expWrap.style.display = 'block'; }
  else       { expWrap.style.display = 'none'; }

  document.getElementById('study-score-label').textContent = `○ ${session.correct}`;
  document.getElementById('answer-section').classList.add('visible');
}

function skipQuestion() { nextQuestion(); }
function nextQuestion() {
  session.idx++;
  if (session.idx >= session.questions.length) showResults();
  else { session.noteUrl = findNoteUrl(session.questions[session.idx].id); renderQuestion(); }
}

function toggleBookmark() {
  const q = session.questions[session.idx];
  const p = getP(q.id);
  p.bookmarked = !p.bookmarked;
  saveProgress();
  updateBookmarkBtn(q.id);
  showToast(p.bookmarked ? 'ブックマーク追加' : 'ブックマーク解除');
}
function updateBookmarkBtn(id) {
  const btn = document.getElementById('bookmark-btn');
  const bm  = PROGRESS[id]?.bookmarked;
  btn.className = 'bookmark-btn' + (bm ? ' bookmarked' : '');
  btn.innerHTML = (bm ? IC.bookmarkFill : IC.bookmark) + (bm ? ' ブックマーク済み' : ' ブックマーク');
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResults() {
  const total = session.questions.length;
  const pct   = total ? Math.round(session.correct / total * 100) : 0;
  document.getElementById('r-total').textContent   = total;
  document.getElementById('r-correct').textContent = session.correct;
  document.getElementById('r-wrong').textContent   = session.wrong;
  document.getElementById('result-title').textContent =
    pct >= 80 ? '素晴らしい！' : pct >= 60 ? 'よくできました！' : 'もう一度挑戦しよう！';
  document.getElementById('result-sub').textContent = `${session.correct}/${total}問正解`;
  document.getElementById('retry-wrong-btn').style.display = session.wrong > 0 ? 'flex' : 'none';

  const r = 52, circ = 2 * Math.PI * r, tgt = circ * (1 - pct / 100);
  const ringColor = pct >= 80 ? '#15803D' : pct >= 60 ? '#CA8A04' : '#B91C1C';
  document.getElementById('score-ring-wrap').innerHTML = `
    <svg class="score-ring" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <circle cx="64" cy="64" r="${r}" fill="none" stroke="#E5E5E5" stroke-width="8"/>
      <circle cx="64" cy="64" r="${r}" fill="none" stroke="${ringColor}" stroke-width="8"
        stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${circ.toFixed(2)}"
        stroke-linecap="round" transform="rotate(-90 64 64)"
        id="score-arc" style="transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)"/>
      <text x="64" y="57" text-anchor="middle" font-size="26" font-weight="800" fill="${ringColor}">${pct}%</text>
      <text x="64" y="76" text-anchor="middle" font-size="11" fill="#999999">正答率</text>
    </svg>`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const arc = document.getElementById('score-arc');
    if (arc) arc.style.strokeDashoffset = tgt.toFixed(2);
  }));

  showScreen('results-screen');
  renderHome();
}

function retryWrong() {
  const wrongQs = session.questions.filter(q => PROGRESS[q.id]?.incorrect > 0);
  if (!wrongQs.length) { showToast('間違えた問題がありません'); return; }
  startSession(wrongQs, null);
}

// ══════════════════════════════════════════════
//  LIST VIEW
// ══════════════════════════════════════════════
function showList(mode) {
  const all = allQuestions();
  let qs, title, emptyMsg;
  if (mode === 'wrong') {
    qs = all.filter(q => PROGRESS[q.id]?.incorrect > 0);
    title = '間違えた問題'; emptyMsg = '間違えた問題はまだありません';
  } else {
    qs = all.filter(q => PROGRESS[q.id]?.bookmarked);
    title = 'ブックマーク'; emptyMsg = 'ブックマークされた問題はまだありません';
  }
  document.getElementById('list-title').textContent     = title;
  document.getElementById('list-empty-msg').textContent = emptyMsg;
  const container = document.getElementById('list-items');
  const empty     = document.getElementById('list-empty');
  if (!qs.length) {
    container.innerHTML = ''; container.style.display = 'none'; empty.style.display = 'block';
  } else {
    container.style.display = 'flex'; empty.style.display = 'none';
    document.getElementById('list-summary').textContent = `${qs.length}問`;
    container.innerHTML = qs.map(q => {
      const badge = q.a === '○'
        ? `<div class="answer-badge">○ 正しい</div>`
        : `<div class="answer-badge">× 誤り</div>`;
      const exp = q.exp ? `<div class="explanation">${q.exp}</div>` : '';
      return `<div class="list-item">
        <div class="list-item-header" onclick="this.closest('.list-item').classList.toggle('open')">
          <div class="list-item-q">${q.q}</div>
          <div class="list-item-arrow">›</div>
        </div>
        <div class="list-item-body">${badge}${exp}</div>
      </div>`;
    }).join('');
  }
  showScreen('list-screen');
}

// ══════════════════════════════════════════════
//  SECTION RESET
// ══════════════════════════════════════════════
function resetSection(secId) {
  let sec = null;
  for (const subj of APP_DATA.subjects)
    for (const s of subj.sections)
      if (s.id === secId) { sec = s; break; }
  if (!sec) return;
  if (!confirm(`「${sec.title}」の進捗をリセットしますか？`)) return;
  sec.questions.forEach(q => { delete PROGRESS[q.id]; });
  saveProgress(); renderSections(); showToast('リセットしました');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() {
  if (HASH_SUBJECT) { showSubject(HASH_SUBJECT); }
  else { showScreen('home'); renderHome(); }
}
function exitStudy() {
  if (session.idx > 0 && confirm('学習を中断しますか？')) goHome();
  else if (session.idx === 0) goHome();
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
